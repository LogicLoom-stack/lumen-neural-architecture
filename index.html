<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen: Neural Architecture</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { margin: 0; background: #010103; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
    #ui { position: fixed; left: 50px; top: 50%; transform: translateY(-50%); z-index: 100; pointer-events: auto; opacity: 0.9; }
    
    #headline-container { margin-bottom: 30px; border-left: 1px solid rgba(0, 255, 204, 0.5); padding-left: 20px; }
    #news-summary { font-size: 12px; color: #00ffcc; letter-spacing: 3px; margin-bottom: 10px; opacity: 0.6; text-transform: uppercase; }
    #news-text { font-size: 18px; max-width: 450px; font-weight: 300; text-transform: uppercase; line-height: 1.4; letter-spacing: 1px; color: #ccffef; min-height: 80px; transition: opacity 0.5s ease; }
    
    .label { color: #00ffcc; letter-spacing: 3px; font-size: 10px; margin-bottom: 8px; opacity: 0.6; display: block; }
    .stat { margin-bottom: 25px; border-left: 1px solid rgba(0, 255, 204, 0.3); padding-left: 20px; }
    .val { font-size: 28px; color: #fff; font-weight: bold; font-variant-numeric: tabular-nums; }
    
    .ml-panel { margin-top: 20px; }
    .ml-row { display: flex; justify-content: space-between; width: 220px; margin-bottom: 8px; font-size: 12px; letter-spacing: 1px; }
    .ml-label { color: rgba(0, 255, 204, 0.4); text-transform: uppercase; }
    .ml-val { color: #00ffcc; font-weight: bold; opacity: 0.9; }

    #debug-log { position: fixed; bottom: 30px; left: 50px; font-size: 9px; color: #444; letter-spacing: 2px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="headline-container">
      <div id="news-summary">NEURAL_SYNTHESIS_ACTIVE</div>
      <div id="news-text">INITIALIZING_STREAM...</div>
    </div>
    
    <div class="stat">
      <span class="label">GLOBAL_SENTIMENT_FLUX</span>
      <span class="val" id="score">+0.00</span>
      
      <div class="ml-panel">
        <div class="ml-row" style="margin-top: 15px;"><span class="ml-label">CONFIDENCE</span><span class="ml-val" id="ml-conf">--%</span></div>
        <div class="ml-row"><span class="ml-label">LATENCY</span><span class="ml-val" id="ml-late">--ms</span></div>
        <div class="ml-row"><span class="ml-label">ENTROPY</span><span class="ml-val" id="ml-entr">--</span></div>
        <div class="ml-row"><span class="ml-label">DRIFT</span><span class="ml-val" id="ml-drft">--Δ</span></div>
      </div>
    </div>
  </div>
  
  <div id="debug-log">ZEN_OS // ENGINE: GEMINI_2.5_FLASH // STATE: REALTIME_INFERENCE</div>

  <script>
    let rawData = null;
    let articleList = [];
    let currentIndex = 0;
    let currentScore = 0;
    let currentState = "RAINBOW";
    let particles = [];
    let chakraMovementData = [];
    
    const chakraShapes = [
      { petals: 4, sides: 4 }, { petals: 6, sides: 0 }, { petals: 10, sides: 3 }, 
      { petals: 12, sides: 6 }, { petals: 16, sides: 0 }, { petals: 2, sides: 0 }, { petals: 24, sides: 0 }
    ];

    const anatomicalY = [1050, 700, 350, 0, -350, -700, -1050];
    const baseRainbow = [[255, 50, 50], [255, 160, 40], [255, 255, 100], [100, 255, 180], [60, 220, 255], [200, 140, 255], [255, 200, 255]];

    async function loadNews() {
      const paths = [`data/news.json?t=${Date.now()}`, `./data/news.json`, `news.json`];
      for (let path of paths) {
        try {
          const response = await fetch(path);
          if (response.ok) {
            rawData = await response.json();
            articleList = rawData.articles || [];
            updateMLPanel();
            cycleHeadline();
            return;
          }
        } catch (e) {}
      }
    }

    function updateMLPanel() {
      const metrics = rawData.ml_metrics || { confidence: 0.98, latency: 15, entropy: 0.1, drift_score: 0.02 };
      document.getElementById('ml-conf').innerText = (metrics.confidence * 100).toFixed(1) + "%";
      document.getElementById('ml-late').innerText = metrics.latency + "ms";
      document.getElementById('ml-entr').innerText = metrics.entropy.toFixed(2);
      document.getElementById('ml-drft').innerText = (metrics.drift_score || 0).toFixed(2) + "Δ";
      document.getElementById('news-summary').innerText = rawData.global_summary || "NEURAL_SYNTHESIS";
    }

    function cycleHeadline() {
      if (articleList.length === 0) return;
      
      const item = articleList[currentIndex];
      const textEl = document.getElementById('news-text');
      const scoreEl = document.getElementById('score');
      
      textEl.style.opacity = 0;
      
      setTimeout(() => {
        textEl.innerText = item.title;
        currentScore = parseFloat(item.score);
        currentState = item.state || (currentScore > 3 ? "GOLD" : currentScore < -3 ? "RED" : "RAINBOW");
        
        scoreEl.innerText = (currentScore >= 0 ? "+" : "") + currentScore.toFixed(2);
        textEl.style.opacity = 1;
        
        currentIndex = (currentIndex + 1) % articleList.length;
      }, 500);

      setTimeout(cycleHeadline, 5000);
    }

    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      for (let i = 0; i < 7; i++) chakraMovementData.push({ rotSpeed: random(0.001, 0.002), floatPhase: i * 0.4 });
      for(let i=0; i<600; i++) particles.push({ x: random(-4000, 4000), y: random(-4000, 4000), z: random(-2500, 500), size: random(1.5, 4), alpha: random(100, 200), velX: random(-0.5, 0.5), velY: random(-0.3, 0.3) });
      loadNews();
    }

    function drawTriangle(s, inv) {
      beginShape();
      let m = inv ? 1 : -1;
      vertex(0, 1.1 * s * m);
      vertex(-0.95 * s, -0.6 * s * m);
      vertex(0.95 * s, -0.6 * s * m);
      endShape(CLOSE);
    }

    function drawPetals(baseRadius, shapeInfo, intensity, pulse, phase, i, resonance) {
      beginShape();
      for (let angle = 0; angle < TWO_PI + 0.1; angle += 0.08) {
        let r;
        if (i === 5) { 
          let maxWingSize = (40 + intensity * 20);
          r = (baseRadius - maxWingSize * 0.5) + (pow(abs(cos(angle)), 0.6) * maxWingSize) + (pulse * 5) + (resonance * 25);
        } else {
          r = baseRadius + (sin(angle * shapeInfo.petals) * (15 + intensity * 25)) + (shapeInfo.sides > 0 ? cos(angle * shapeInfo.sides) * (8 + intensity * 15) : 0) + (pulse * 5) + (resonance * 25);
        }
        vertex(r * cos(angle), r * sin(angle), sin(angle * 2 + phase) * 20);
      }
      endShape(CLOSE);
    }

    function draw() {
      background(1, 1, 4); 
      let intensity = map(currentScore, -10, 10, 0.2, 0.8);

      noStroke();
      for(let p of particles) {
        p.x += p.velX; p.y += p.velY;
        fill(255, p.alpha * map(sin(frameCount * 0.03 + p.x), -1, 1, 0.5, 1));
        push(); translate(p.x, p.y, p.z); ellipse(0, 0, p.size, p.size); pop();
      }

      translate(width * 0.25, 0, -1600); 
      
      for (let i = 0; i < 7; i++) {
        let m = chakraMovementData[i];
        let res = 0.2 + (abs(currentScore) / 20); // Dynamic resonance based on score intensity
        
        push();
        translate(0, anatomicalY[i] + sin(frameCount * 0.005) * 20 + sin(frameCount * 0.012 - m.floatPhase) * 40, 0);
        let phase = frameCount * 0.005 + (i * 0.8);
        let pulse = sin(phase);
        
        let r, g, b;
        let bc = baseRainbow[i];
        
        if (currentState === 'GOLD') {
          r = 255; g = map(currentScore, 3, 10, 160, 240); b = map(currentScore, 3, 10, 40, 100);
        } else if (currentState === 'RED') {
          r = 255; g = map(currentScore, -10, -3, 20, 90); b = map(currentScore, -10, -3, 10, 50);
        } else {
          r = bc[0] + (currentScore * 8); g = bc[1] + (currentScore * 3); b = bc[2] - (currentScore * 8);
        }

        r = lerp(r, 255, res * 0.7); g = lerp(g, 255, res * 0.5); b = lerp(b, 255, res * 0.8);

        rotateY(frameCount * m.rotSpeed + (i * 0.2));
        rotateX(0.35); noFill();
        strokeWeight(2 + res * 3); 
        for (let j = 0; j < 3; j++) {
          stroke(r, g, b, 255 * map(sin(phase * 1.5 - j), -1, 1, 0.6, 1)); 
          drawPetals(120 + (j * 30), chakraShapes[i], intensity, pulse, phase, i, res);
        }
        fill(r, g, b, 180 + (pulse * 40)); noStroke();
        let sz = 38 + (pulse * 6) + (res * 15); 
        if (i === 0) box(sz); 
        else if (i === 1) { rotateZ(HALF_PI); arc(0, 0, sz * 1.6, sz * 1.6, 0, PI); } 
        else if (i === 2 || i === 5) drawTriangle(sz, true); 
        else if (i === 3) { drawTriangle(sz, true); drawTriangle(sz, false); } 
        else if (i === 4) ellipse(0, 0, sz * 1.3, sz * 1.3); 
        else if (i === 6) sphere(sz * 0.9, 16, 16); 
        pop();
      }
    }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
