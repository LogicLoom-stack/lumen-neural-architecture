<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen: Neural Architecture V5</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    :root {
      --current-accent: #00ffcc;
      --bg-deep: #020305;
    }
    body { margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-deep); font-family: 'Courier New', monospace; }
    canvas { display: block; }
    
    #logic-terminal {
      position: fixed;
      left: 50px;
      top: 50%;
      transform: translateY(-50%);
      width: 480px;
      z-index: 100;
      pointer-events: none;
      border-left: 1px solid var(--current-accent);
      padding: 30px 0 30px 40px;
      background: linear-gradient(90deg, rgba(var(--accent-rgb), 0.1) 0%, transparent 100%);
      transition: border-color 1s ease;
    }

    .label-tech { 
      font-size: 10px; 
      color: var(--current-accent); 
      text-transform: uppercase; 
      letter-spacing: 5px; 
      margin-bottom: 15px; 
      opacity: 0.6; 
    }
    
    #news-display { 
      font-size: 26px; 
      line-height: 1.1; 
      color: #ffffff; 
      font-weight: 900; 
      text-transform: uppercase; 
      min-height: 100px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .metric-group { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); pt: 20px; }
    .data-row { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
    .value-num { font-size: 14px; color: #ffffff; font-weight: bold; font-family: 'Courier New', monospace; }
    
    .category-badge {
      display: inline-block;
      padding: 4px 12px;
      background: var(--current-accent);
      color: #000;
      font-size: 10px;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    /* CRT/Scanline Overlays */
    .overlay-vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
      z-index: 150;
      pointer-events: none;
    }
    .scanlines {
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 3px, 3px 100%;
      z-index: 200;
      pointer-events: none;
    }
  </style>
</head>
