<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen: Neural Architecture</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    :root { --accent: #00ffcc; --bg: #020305; }
    body { margin: 0; background: var(--bg); color: white; font-family: monospace; overflow: hidden; }
    #ui { position: fixed; left: 40px; top: 50%; transform: translateY(-50%); z-index: 100; pointer-events: none; }
    #news-text { font-size: 20px; max-width: 400px; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; transition: all 0.8s ease; letter-spacing: 1px; line-height: 1.3; }
    .label { color: var(--accent); letter-spacing: 3px; font-size: 10px; margin-bottom: 5px; opacity: 0.6; }
    .stat { margin-bottom: 20px; }
    #score { font-size: 18px; font-weight: bold; }
    #debug-log { position: fixed; bottom: 10px; left: 10px; font-size: 8px; color: #444; pointer-events: none; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="stat">
      <div class="label">NEURAL_FEED_STATUS</div>
      <div id="status">INIT_SEQUENCING...</div>
    </div>
    <div id="news-text">CONNECTING_TO_STREAM...</div>
    <div class="stat">
      <div class="label">SENTIMENT_ANALYSIS</div>
      <div id="score">0.00</div>
    </div>
  </div>
  <div id="debug-log">LOG: System start...</div>

  <script>
    let newsData = [];
    let currentIndex = 0;
    let particles = [];
    
    // EXACT LEGACY DESIGN TOKENS
    const petalCounts = [4, 6, 10, 12, 16, 2, 80]; 
    const anatomicalY = [380, 260, 120, 0, -140, -260, -360];
    const colors = [
      [255, 50, 50], [255, 105, 180], [255, 215, 0], 
      [0, 255, 120], [0, 180, 255], [176, 191, 26], [200, 80, 255]
    ];

    function log(msg) {
      console.log(msg);
      document.getElementById('debug-log').innerText = "LOG: " + msg;
    }

    async function loadNews() {
      const statusEl = document.getElementById('status');
      const repoName = window.location.pathname.split('/')[1];
      const path = window.location.hostname.includes('github.io') ? `/${repoName}/data/news.json` : 'data/news.json';

      try {
        const response = await fetch(`${path}?t=${Date.now()}`);
        if (response.ok) {
          newsData = await response.json();
          statusEl.innerText = "SIGNAL_STABLE";
          log("Data synced.");
          updateDisplay();
        } else { throw new Error(); }
      } catch (e) {
        log("External feed failed. Using simulated backup.");
        statusEl.innerText = "SIMULATED_FEED";
        newsData = [{"text": "NEURAL CORE STABILIZED", "score": 5.0, "color_hex": "#00ffcc"}];
        updateDisplay();
      }
    }

    function updateDisplay() {
      if (newsData.length === 0) return;
      const item = newsData[currentIndex];
      document.getElementById('news-text').innerText = item.text;
      document.getElementById('score').innerText = item.score;
      if (item.color_hex) document.documentElement.style.setProperty('--accent', item.color_hex);
      
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % newsData.length;
        updateDisplay();
      }, 10000);
    }

    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      setAttributes('antialias', true);
      for(let i=0; i<120; i++) {
        particles.push({
          pos: createVector(random(-1200, 1200), random(-1200, 1200), random(-1200, 1200)),
          speed: random(0.0005, 0.001)
        });
      }
      loadNews();
    }

    function draw() {
      let score = parseFloat(newsData[currentIndex]?.score || 0);
      let intensity = map(score, -15, 15, 0.2, 1.3);
      
      // Legacy background depth
      let bgR = lerp(10, 50, intensity * 0.5);
      background(bgR, 12, 20); 
      
      orbitControl(2, 2, 0.1);
      
      // Floating Dust/Starfield
      stroke(255, 80);
      strokeWeight(1);
      beginShape(POINTS);
      particles.forEach(p => {
        vertex(p.pos.x, p.pos.y, p.pos.z);
        p.pos.y += 0.2; // Slow downward drift
        if(p.pos.y > 600) p.pos.y = -600;
      });
      endShape();

      // LEGACY CHAKRA ARCHITECTURE
      translate(0, 0, -400); // Push back slightly more for better viewing

      for (let i = 0; i < 7; i++) {
        push();
        translate(0, anatomicalY[i], 0);

        let phase = frameCount * 0.015 + (i * 0.8);
        let pulse = sin(phase);
        let petals = petalCounts[i];
        let c = colors[i];

        // Smooth rotation
        rotateY(frameCount * 0.004 + (i * 0.12));
        rotateX(sin(phase * 0.2) * 0.15);

        // Drawing the 3 Petal Rings (The "Dreamy Curtain" logic)
        noFill();
        for (let j = 0; j < 3; j++) {
          push();
          let baseRadius = 60 + (j * 18);
          stroke(c[0], c[1], c[2], 190 - (j * 45));
          strokeWeight(1.5 + (intensity * 2.8));

          beginShape();
          for (let angle = 0; angle < TWO_PI; angle += 0.04) {
            // The "Dreamy" Math
            // 1. Basic Petal Shape
            let petalShape = sin(angle * petals) * (8 + intensity * 30);
            
            // 2. The Noise Wobble (Curtain ripple)
            let noiseX = cos(angle) + i;
            let noiseY = sin(angle) + j;
            let noiseTime = frameCount * 0.006;
            let noiseOff = noise(noiseX, noiseY, noiseTime);
            let wobble = map(noiseOff, 0, 1, -8, 8) * (1 + intensity * 8);
            
            // 3. Fluid Radius
            let r = baseRadius + petalShape + (pulse * 6) + wobble;
            
            let x = r * cos(angle);
            let y = r * sin(angle);
            
            // 4. The Depth Wave (Crucial for the "Curtain" look)
            // Displacement along Z creates the fabric-like folding effect
            let z = cos(phase * 1.2 + angle * 2) * (10 + intensity * 35);
            
            vertex(x, y, z);
          }
          endShape(CLOSE);
          pop();
        }

        // Inner Sacred Geometry Core
        push();
        fill(c[0], c[1], c[2], 100 + (intensity * 50));
        noStroke();
        rotateZ(frameCount * 0.015);
        let sz = 26 + (pulse * 5);

        if (i === 0) box(sz);
        else if (i === 1) { rotateZ(HALF_PI); arc(0, 0, sz * 1.8, sz * 1.8, 0, PI); }
        else if (i === 2) drawYantraTriangle(sz, true);
        else if (i === 3) { drawYantraTriangle(sz, true); drawYantraTriangle(sz, false); }
        else if (i === 4) { ellipse(0, 0, sz * 1.4, sz * 1.4); fill(255, 130); drawYantraTriangle(sz * 0.7, true); }
        else if (i === 5) drawYantraTriangle(sz, true);
        else if (i === 6) sphere(sz * 0.95, 18, 18);
        pop();

        pop();
      }
    }

    function drawYantraTriangle(size, inverted) {
      beginShape();
      let m = inverted ? 1 : -1;
      vertex(0, 1 * size * m);
      vertex(-0.86 * size, -0.5 * size * m);
      vertex(0.86 * size, -0.5 * size * m);
      endShape(CLOSE);
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
