<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen: Neural Architecture</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { margin: 0; background: #010103; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
    #ui { position: fixed; left: 50px; top: 50%; transform: translateY(-50%); z-index: 100; pointer-events: none; opacity: 0.8; }
    #news-text { font-size: 20px; max-width: 400px; font-weight: 300; text-transform: uppercase; margin-bottom: 30px; line-height: 1.4; letter-spacing: 2px; color: #ccffef; }
    
    .label { color: #00ffcc; letter-spacing: 3px; font-size: 10px; margin-bottom: 8px; opacity: 0.6; display: block; }
    .stat { margin-bottom: 25px; border-left: 1px solid rgba(0, 255, 204, 0.5); padding-left: 20px; }
    .val { font-size: 16px; color: #aaa; }
    
    .ml-panel { margin-top: 40px; border-top: 1px solid rgba(0, 255, 204, 0.2); pt: 20px; }
    .ml-row { display: flex; justify-content: space-between; width: 220px; margin-bottom: 10px; font-size: 12px; letter-spacing: 1px; }
    .ml-label { color: #555; }
    .ml-val { color: #00ffcc; font-weight: bold; }

    #debug-log { position: fixed; bottom: 30px; left: 50px; font-size: 9px; color: #444; letter-spacing: 2px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="stat">
      <div class="label">NEURAL_STREAM</div>
      <div id="news-text">SYNCING_INFERENCE...</div>
    </div>
    
    <div class="stat">
      <span class="label">SENTIMENT_FLUX</span>
      <span class="val" id="score">+0.00</span>
    </div>

    <div class="ml-panel">
      <div class="label">MODEL_TELEMETRY</div>
      <div class="ml-row"><span class="ml-label">CONFIDENCE</span><span class="ml-val" id="ml-conf">0.0%</span></div>
      <div class="ml-row"><span class="ml-label">LATENCY</span><span class="ml-val" id="ml-late">0ms</span></div>
      <div class="ml-row"><span class="ml-label">ENTROPY</span><span class="ml-val" id="ml-entr">0.00</span></div>
      <div class="ml-row"><span class="ml-label">DRIFT_SCORE</span><span class="ml-val" id="ml-drft">0.00Δ</span></div>
    </div>
  </div>
  
  <div id="debug-log">ZEN_OS // ENGINE: GEMINI_2.5_FLASH // STATE: ANALYSIS_ACTIVE</div>

  <script>
    let newsData = [];
    let currentIndex = 0;
    let particles = [];
    let chakraMovementData = [];
    
    const chakraShapes = [
      { petals: 4,  sides: 4 },  
      { petals: 6,  sides: 0 },  
      { petals: 10, sides: 3 },  
      { petals: 12, sides: 6 },  
      { petals: 16, sides: 0 },  
      { petals: 2,  sides: 0 }, 
      { petals: 24, sides: 0 }  
    ];

    const anatomicalY = [1050, 700, 350, 0, -350, -700, -1050];
    
    const baseRainbow = [
      [255, 50, 50], [255, 160, 40], [255, 255, 100], 
      [100, 255, 180], [60, 220, 255], [200, 140, 255], [255, 200, 255]
    ];

    async function loadNews() {
      try {
        const response = await fetch(`data/news.json?t=${Date.now()}`);
        if (response.ok) {
          newsData = await response.json();
          updateDisplay();
        }
      } catch (e) {
        newsData = [{
          "text": "OFFLINE_TELEMETRY_FALLBACK", 
          "score": 1.2, 
          "global_state": "RAINBOW",
          "resonances": [0.2, 0.2, 0.2, 0.8, 0.2, 0.2, 0.2],
          "ml_metrics": {"confidence": 0.94, "latency": 42, "entropy": 0.12, "drift_score": 0.05}
        }];
        updateDisplay();
      }
    }

    function updateDisplay() {
      if (newsData.length === 0) return;
      const item = newsData[currentIndex];
      
      // Update Text UI
      document.getElementById('news-text').innerText = item.text;
      document.getElementById('score').innerText = (item.score > 0 ? "+" : "") + item.score;
      
      // Update ML Metrics UI
      if(item.ml_metrics) {
        document.getElementById('ml-conf').innerText = (item.ml_metrics.confidence * 100).toFixed(1) + "%";
        document.getElementById('ml-late').innerText = item.ml_metrics.latency + "ms";
        document.getElementById('ml-entr').innerText = item.ml_metrics.entropy.toFixed(2);
        document.getElementById('ml-drft').innerText = item.ml_metrics.drift_score.toFixed(2) + "Δ";
      }

      setTimeout(() => {
        currentIndex = (currentIndex + 1) % newsData.length;
        updateDisplay();
      }, 15000);
    }

    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      for (let i = 0; i < 7; i++) {
        chakraMovementData.push({
          rotSpeed: random(0.001, 0.002), 
          floatPhase: i * 0.4
        });
      }
      for(let i=0; i<600; i++) {
        particles.push({
          x: random(-4000, 4000), y: random(-4000, 4000), z: random(-2500, 500),
          size: random(1.5, 4), alpha: random(100, 200), velX: random(-0.5, 0.5), velY: random(-0.3, 0.3)
        });
      }
      loadNews();
    }

    function drawTriangle(s, inv) {
      beginShape();
      let m = inv ? 1 : -1;
      vertex(0, 1.1 * s * m);
      vertex(-0.95 * s, -0.6 * s * m);
      vertex(0.95 * s, -0.6 * s * m);
      endShape(CLOSE);
    }

    function drawPetals(baseRadius, shapeInfo, intensity, pulse, phase, i, resonance) {
      beginShape();
      for (let angle = 0; angle < TWO_PI + 0.1; angle += 0.05) {
        let r;
        let flare = resonance * 20;
        if (i === 5) { 
          let maxWingSize = (40 + intensity * 20);
          let wingShape = pow(abs(cos(angle)), 0.6) * maxWingSize;
          r = (baseRadius - maxWingSize * 0.5) + wingShape + (pulse * 5) + flare;
        } else {
          let petalShape = sin(angle * shapeInfo.petals) * (15 + intensity * 25);
          let baseMod = shapeInfo.sides > 0 ? cos(angle * shapeInfo.sides) * (8 + intensity * 15) : 0;
          r = baseRadius + petalShape + baseMod + (pulse * 5) + flare;
        }
        vertex(r * cos(angle), r * sin(angle), sin(angle * 2 + phase) * 20);
      }
      endShape(CLOSE);
    }

    function draw() {
      background(1, 1, 4); 
      
      let item = newsData[currentIndex] || {score: 0, global_state: 'RAINBOW', resonances: [0,0,0,0,0,0,0]};
      let intensity = map(parseFloat(item.score), -15, 15, 0.3, 0.6);
      let gState = item.global_state || 'RAINBOW';

      // Stars
      noStroke();
      for(let p of particles) {
        p.x += p.velX; p.y += p.velY;
        fill(255, p.alpha * map(sin(frameCount * 0.03 + p.x), -1, 1, 0.5, 1));
        push(); translate(p.x, p.y, p.z); ellipse(0, 0, p.size, p.size); pop();
      }

      translate(width * 0.25, 0, -1600); 
      
      for (let i = 0; i < 7; i++) {
        let m = chakraMovementData[i];
        let res = item.resonances ? (item.resonances[i] || 0) : 0;
        
        push();
        translate(0, anatomicalY[i] + sin(frameCount * 0.005) * 20 + sin(frameCount * 0.012 - m.floatPhase) * 40, 0);

        let phase = frameCount * 0.005 + (i * 0.8);
        let pulse = sin(phase);
        
        // GLOBAL COLOR LOGIC
        let r, g, b;
        if (gState === 'GOLD') {
          r = 255; g = 215; b = 0; // Gold base
        } else if (gState === 'RED') {
          r = 255; g = 30; b = 30; // Red base
        } else {
          let bc = baseRainbow[i];
          r = bc[0]; g = bc[1]; b = bc[2]; // Rainbow base
        }

        // Apply Resonance (White Flare)
        r = lerp(r, 255, res * 0.8);
        g = lerp(g, 255, res * 0.6);
        b = lerp(b, 255, res * 0.9);

        rotateY(frameCount * m.rotSpeed + (i * 0.2));
        rotateX(0.35); 
        noFill();
        strokeWeight(2.0 + res * 3); 
        
        for (let j = 0; j < 3; j++) {
          stroke(r, g, b, 255 * map(sin(phase * 1.5 - j), -1, 1, 0.7, 1)); 
          drawPetals(120 + (j * 30), chakraShapes[i], intensity, pulse, phase, i, res);
        }

        // Core
        fill(r, g, b, 230 + (pulse * 25));
        noStroke();
        let sz = 35 + (pulse * 5) + (res * 15); 
        if (i === 0) box(sz); 
        else if (i === 1) { rotateZ(HALF_PI); arc(0, 0, sz * 1.5, sz * 1.5, 0, PI); } 
        else if (i === 2 || i === 5) drawTriangle(sz, true); 
        else if (i === 3) { drawTriangle(sz, true); drawTriangle(sz, false); } 
        else if (i === 4) ellipse(0, 0, sz * 1.2, sz * 1.2); 
        else if (i === 6) sphere(sz * 0.8, 24, 24); 
        pop();
      }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
