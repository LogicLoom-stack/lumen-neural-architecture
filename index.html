<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen: Neural Architecture</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { margin: 0; background: #010103; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
    #ui { position: fixed; left: 50px; top: 50%; transform: translateY(-50%); z-index: 100; pointer-events: none; opacity: 0.8; }
    #news-text { font-size: 20px; max-width: 400px; font-weight: 300; text-transform: uppercase; margin-bottom: 30px; line-height: 1.4; letter-spacing: 2px; color: #ccffef; }
    .label { color: #00ffcc; letter-spacing: 3px; font-size: 10px; margin-bottom: 8px; opacity: 0.6; display: block; }
    .stat { margin-bottom: 30px; border-left: 1px solid rgba(0, 255, 204, 0.5); padding-left: 20px; }
    .val { font-size: 16px; color: #aaa; }
    #debug-log { position: fixed; bottom: 30px; left: 50px; font-size: 9px; color: #444; letter-spacing: 2px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="stat">
      <div class="label">NEURAL_STREAM</div>
      <div id="news-text">HARMONIC_COUPLING...</div>
    </div>
    <div class="stat">
      <span class="label">SENTIMENT_FLUX</span>
      <span class="val" id="score">+0.00</span>
    </div>
  </div>
  <div id="debug-log">ZEN_OS // MODE: ENERGY_CONDUCTIVITY // SCALE_LOCKED: TRUE</div>

  <script>
    let newsData = [];
    let currentIndex = 0;
    let particles = [];
    let chakraMovementData = [];
    
    const chakraShapes = [
      { petals: 4,  sides: 4 },  
      { petals: 6,  sides: 0 },  
      { petals: 10, sides: 3 },  
      { petals: 12, sides: 6 },  
      { petals: 16, sides: 0 },  
      { petals: 2,  sides: 0 }, // Ajna
      { petals: 24, sides: 0 }  // Sahasrara
    ];

    const anatomicalY = [1050, 700, 350, 0, -350, -700, -1050];
    
    const colors = [
      [255, 50, 50], [255, 160, 40], [255, 255, 100], 
      [100, 255, 180], [60, 220, 255], [200, 140, 255], [255, 200, 255]
    ];

    async function loadNews() {
      try {
        const response = await fetch(`data/news.json?t=${Date.now()}`);
        if (response.ok) {
          newsData = await response.json();
          updateDisplay();
        }
      } catch (e) {
        newsData = [{"text": "GEOMETRIC SCALE NORMALIZED", "score": 1.08}];
        updateDisplay();
      }
    }

    function updateDisplay() {
      if (newsData.length === 0) return;
      const item = newsData[currentIndex];
      document.getElementById('news-text').innerText = item.text;
      document.getElementById('score').innerText = (item.score > 0 ? "+" : "") + item.score;
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % newsData.length;
        updateDisplay();
      }, 15000);
    }

    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      setAttributes('antialias', true);
      
      for (let i = 0; i < 7; i++) {
        chakraMovementData.push({
          rotSpeed: random(0.001, 0.002), 
          floatPhase: i * 0.4, 
          tiltPhase: random(1000)
        });
      }

      for(let i=0; i<600; i++) {
        particles.push({
          x: random(-4000, 4000), y: random(-4000, 4000), z: random(-2500, 500),
          size: random(1.5, 4), alpha: random(100, 200), velX: random(-0.5, 0.5), velY: random(-0.3, 0.3)
        });
      }
      loadNews();
    }

    function drawTriangle(s, inv) {
      beginShape();
      let m = inv ? 1 : -1;
      vertex(0, 1.1 * s * m);
      vertex(-0.95 * s, -0.6 * s * m);
      vertex(0.95 * s, -0.6 * s * m);
      endShape(CLOSE);
    }

    function drawPetals(baseRadius, shapeInfo, intensity, pulse, phase, i, j) {
      beginShape();
      for (let angle = 0; angle < TWO_PI + 0.1; angle += 0.05) {
        let r;
        if (i === 5) { 
          // Adjust base radius for Ajna wings to stay within scale
          // Subtracting the wing protrusion from the base to normalize the total diameter
          let maxWingSize = (40 + intensity * 20);
          let wingShape = pow(abs(cos(angle)), 0.6) * maxWingSize;
          r = (baseRadius - maxWingSize * 0.5) + wingShape + (pulse * 5);
        } else {
          let petalShape = sin(angle * shapeInfo.petals) * (15 + intensity * 25);
          let baseMod = shapeInfo.sides > 0 ? cos(angle * shapeInfo.sides) * (8 + intensity * 15) : 0;
          r = baseRadius + petalShape + baseMod + (pulse * 5);
        }
        let x = r * cos(angle);
        let y = r * sin(angle);
        let z = sin(angle * 2 + phase) * 20;
        vertex(x, y, z);
      }
      endShape(CLOSE);
    }

    function draw() {
      background(1, 1, 4); 
      
      noStroke();
      for(let p of particles) {
        p.x += p.velX; p.y += p.velY;
        if (abs(p.x) > 4000) p.x *= -0.99; if (abs(p.y) > 4000) p.y *= -0.99;
        fill(255, p.alpha * map(sin(frameCount * 0.03 + p.x), -1, 1, 0.5, 1));
        push(); translate(p.x, p.y, p.z); ellipse(0, 0, p.size, p.size); pop();
      }

      let camX = sin(frameCount * 0.002) * 60;
      let camY = cos(frameCount * 0.001) * 40;
      translate(width * 0.25 + camX, camY, -1600); 
      
      let intensity = map(parseFloat(newsData[currentIndex]?.score || 0), -15, 15, 0.3, 0.6);

      // SHARED ENERGY COLUMN (Filaments)
      strokeWeight(0.5);
      for(let k=0; k<3; k++) {
        stroke(100, 255, 200, 40);
        let xOff = sin(frameCount * 0.01 + k) * 30;
        line(xOff, -1200, xOff, 1200);
      }

      for (let i = 0; i < 7; i++) {
        let m = chakraMovementData[i];
        push();
        
        let breath = sin(frameCount * 0.005) * 20;
        let wave = sin(frameCount * 0.012 - m.floatPhase) * 40;
        translate(0, anatomicalY[i] + breath + wave, 0);

        let phase = frameCount * 0.005 + (i * 0.8);
        let pulse = sin(phase);
        let c = colors[i];
        let shapeInfo = chakraShapes[i];

        rotateY(frameCount * m.rotSpeed + (i * 0.2));
        rotateX(0.35 + sin(frameCount * 0.008 + m.floatPhase) * 0.1); 

        noFill();
        strokeWeight(2.0); 
        
        for (let j = 0; j < 3; j++) {
          let baseRadius = 120 + (j * 30);
          let ripple = map(sin(phase * 1.5 - j * 1.0), -1, 1, 0.7, 1.0);
          stroke(c[0], c[1], c[2], 255 * ripple); 
          drawPetals(baseRadius, shapeInfo, intensity, pulse, phase, i, j);
        }

        // Core Shapes
        push();
        fill(c[0], c[1], c[2], 230 + (pulse * 25));
        noStroke();
        rotateZ(frameCount * 0.005);
        let sz = 35 + (pulse * 5); 

        if (i === 0) box(sz); 
        else if (i === 1) { rotateZ(HALF_PI); arc(0, 0, sz * 1.5, sz * 1.5, 0, PI); } 
        else if (i === 2) drawTriangle(sz, true); 
        else if (i === 3) { drawTriangle(sz, true); drawTriangle(sz, false); } 
        else if (i === 4) ellipse(0, 0, sz * 1.2, sz * 1.2); 
        else if (i === 5) drawTriangle(sz, true); 
        else if (i === 6) sphere(sz * 0.8, 24, 24); 
        pop();
        
        pop();
      }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
