name: Daily News Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # Updated from v3 to v4 for Node 24 support

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated from v4 to v5 for Node 24 support
        with:
          python-version: '3.9'

      # Opt-in to Node 24 as per the deprecation notice
      - name: Set Node 24 Environment
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install Dependencies
        run: pip install requests google-genai

      - name: Run Script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Commit and Push
        run: |
          git config --global user.name "NewsBot"
          git config --global user.email "bot@github.com"
          git add data/news.json
          git commit -m "Daily sentiment update" || echo "No changes"
          git push
